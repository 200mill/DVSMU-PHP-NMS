<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BM Korea Live Monitor</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --green: #00e676; 
            --red: #ff5252; --warn: #ffb142; --blue: #4da6ff;
        }
        body { 
            font-family: 'Malgun Gothic', 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: #fff; 
            margin: 0; 
            padding: 15px; 
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(77, 166, 255, 0.8); }

        .header-container { 
            display: flex; align-items: flex-start; justify-content: space-between; 
            flex-wrap: wrap; gap: 10px; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px;
        }
        .title-area { display: flex; flex-direction: column; gap: 6px; }
        .header-title { color: var(--blue); display: flex; align-items: center; gap: 8px; font-size: 1.8rem; font-weight: bold; margin: 0; }
        .version-info { font-size: 0.85rem; color: #aaa; }
        
        .control-btn { 
            padding: 10px 15px; border: none; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer; font-size: 0.95rem; transition: 0.3s;
        }
        .sound-btn { background: #333; border: 1px solid var(--warn); color: var(--warn); }
        .sound-btn.active { background: var(--warn); color: #000; box-shadow: 0 0 10px rgba(255,177,66,0.5); }

        .info-box { background-color: var(--card); padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border-top: 3px solid var(--blue); }
        .favorite-tag { background: #e74c3c; padding: 5px 12px; border-radius: 15px; font-weight: bold; margin-right: 8px; display: inline-flex; align-items: center; margin-bottom: 5px; font-size: 0.85rem; }
        .delete-btn { background: none; border: none; color: white; margin-left: 8px; cursor: pointer; font-size: 1rem; padding: 0; font-weight: bold; }
        
        .add-form { margin-top: 15px; display: flex; gap: 10px; align-items: center; background: #222; padding: 12px; border-radius: 6px; flex-wrap: wrap; border: 1px solid #444; }
        .add-form input { padding: 10px; border: 1px solid #555; border-radius: 4px; background: #111; color: white; text-transform: uppercase; flex: 1; min-width: 150px; }
        .add-form button { padding: 10px 20px; background: var(--blue); border: none; border-radius: 4px; color: #000; font-weight: bold; cursor: pointer; white-space: nowrap; }

        .lhmon-wrapper { background: #1a1a1a; border-radius: 6px; overflow: hidden; border: 1px solid #333; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .lhmon-header { background: #111; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .lhmon-header h3 { margin: 0; color: var(--blue); font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .lhmon-status { font-size: 0.8rem; padding: 4px 12px; border-radius: 12px; background: transparent; border: 1px solid var(--green); color: var(--green); font-weight: bold; }
        
        .lhmon-filters { background: #1f1f1f; padding: 15px 20px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; border-bottom: 1px solid #333; }
        .filter-label { color: var(--warn); font-size: 1rem; white-space: nowrap; margin-right: 5px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .custom-checkbox { background: #2a2a2a; padding: 8px 14px; border-radius: 20px; border: 1px solid #444; font-size: 0.9rem; color: #eee; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; user-select: none; }
        .custom-checkbox:hover { border-color: var(--blue); background: #333; }
        .custom-checkbox input[type="checkbox"] { accent-color: var(--blue); width: 16px; height: 16px; margin: 0; cursor: pointer; }
        
        .input-group { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 250px; }
        .input-group label { font-size: 0.9rem; color: #aaa; white-space: nowrap; }
        .input-group input { flex: 1; padding: 8px 12px; border: 1px solid #555; border-radius: 20px; background: #111; color: white; font-size: 0.95rem; }

        .lhmon-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .lhmon-table th { background: #222; color: #aaa; padding: 12px 10px; font-size: 0.85rem; border-bottom: 1px solid #333; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .lhmon-table th:nth-child(1) { width: 110px; } 
        .lhmon-table th:nth-child(2) { width: 120px; } 
        .lhmon-table th:nth-child(3) { width: auto; text-align: left; padding-left: 20px; } 
        
        .lhmon-table td { padding: 15px 10px; border-bottom: 1px solid #333; vertical-align: middle; overflow: hidden; }
        
        .lh-tg-cell { text-align: center !important; background: rgba(0,0,0,0.15); border-right: 1px solid #333; white-space: nowrap; padding: 15px !important; }
        .lh-tg-num { font-size: 1.4rem; font-weight: 900; color: #fff; display: block; line-height: 1; letter-spacing: 1px; }
        .lh-tg-name { font-size: 0.7rem; color: var(--green); margin-top: 4px; display: block; text-transform: uppercase; font-weight: bold; overflow: hidden; text-overflow: ellipsis; }
        
        .lh-onair-cell { text-align: center !important; border-right: 1px dashed #333; background: rgba(255, 235, 59, 0.03); white-space: nowrap; padding: 15px 5px !important; }
        .onair-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40px; width: 100%; }
        .onair-empty { color: #555; font-size: 0.8rem; font-style: italic; }

        /* 💡 ON-AIR TalkerAlias 스타일 */
        .onair-alias-wrapper { width: 100%; overflow: hidden; text-align: center; margin: 3px 0; }
        .onair-alias { display: inline-block; white-space: nowrap; color: #b3d9ff; font-weight: 600; letter-spacing: 0.2px; }

        .lh-history-cell { text-align: left; padding-left: 20px !important; }
        
        .lh-history-wrapper { 
            display: flex; 
            flex-wrap: nowrap; 
            gap: 15px; 
            align-items: flex-start; 
            overflow-x: auto; 
            padding-bottom: 8px; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .lh-history-wrapper::-webkit-scrollbar { height: 6px; }
        .lh-history-wrapper::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); border-radius: 4px; }
        .lh-history-wrapper::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 4px; }
        .lh-history-wrapper::-webkit-scrollbar-thumb:hover { background: rgba(77, 166, 255, 0.8); }

        .lh-item-container { display: flex; align-items: flex-start; flex-shrink: 0; }
        .lh-item { 
            display: inline-flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            position: relative; 
            flex-shrink: 0; 
            padding: 4px 8px; 
            border-radius: 4px;
            transition: all 0.3s;
        }
        
        .fav-history-glow {
            background: rgba(255, 82, 82, 0.2);
            border: 1px solid rgba(255, 82, 82, 0.5);
            box-shadow: 0 0 10px rgba(255, 82, 82, 0.4), inset 0 0 5px rgba(255, 82, 82, 0.2);
        }

        .lh-call { font-weight: 900; color: #fff; font-size: 1.05rem; cursor: pointer; transition: color 0.2s; white-space: nowrap; letter-spacing: 0.5px; }
        .lh-call:hover { color: var(--blue); text-decoration: underline; }
        .lh-time { font-size: 0.75rem; color: #aaa; margin-top: 2px; font-family: monospace; font-weight: bold; }
        
        .time-dim { color: #888; }
        .fav-call { color: #ffeb3b !important; }
        .lh-comma { color: #666; font-weight: bold; font-size: 1rem; align-self: flex-start; margin-top: 5px; flex-shrink: 0; margin-left: 10px; }

        .onair-call { 
            font-size: 1.25rem; 
            color: #ffeb3b !important; 
            text-shadow: 0 0 8px rgba(255, 235, 59, 0.8), 0 0 15px rgba(255, 235, 59, 0.6); 
            animation: pttGlow 1.2s infinite alternate; 
        }
        @keyframes pttGlow {
            from { text-shadow: 0 0 5px rgba(255, 235, 59, 0.4); }
            to { text-shadow: 0 0 15px rgba(255, 235, 59, 1), 0 0 20px rgba(255, 235, 59, 0.8); }
        }
        .ptt-icon { margin-left: 4px; font-size: 1em; animation: pttPulse 0.6s infinite alternate; display: inline-block; filter: drop-shadow(0 0 5px #ffeb3b); }
        @keyframes pttPulse {
            from { transform: scale(0.9); opacity: 0.8; }
            to { transform: scale(1.25); opacity: 1; }
        }

        .footer-container { margin-top: 40px; padding-top: 20px; text-align: center; color: #888; font-size: 0.85rem; border-top: 1px dashed #444; line-height: 1.8; word-break: keep-all; padding-bottom: 20px; }
        .footer-contact { color: var(--warn); font-weight: bold; margin: 5px 0; }

        @media (max-width: 768px) {
            html { font-size: 14px; } 
            .header-container { flex-direction: column; align-items: stretch; text-align: center; }
            .title-area { align-items: center; }
            .header-title { font-size: 1.4rem; justify-content: center; }
            .version-info { font-size: 0.8rem; }
            
            .header-buttons { width: 100%; justify-content: center; margin-top: 10px; display: flex; }
            .control-btn { width: 100%; padding: 10px; font-size: 0.95rem; display: block; box-sizing: border-box; }
            
            .info-box { padding: 15px; }
            .add-form { flex-direction: column; width: 100%; padding: 10px 0; background: transparent; border: none; gap: 8px; }
            .add-form input, .add-form button { width: 100%; box-sizing: border-box; }
            
            .lhmon-table th:nth-child(1) { width: 85px; }
            .lhmon-table th:nth-child(2) { width: 105px; }
            .lhmon-table th:nth-child(3) { width: auto; padding-left: 10px; }
            
            .lhmon-table th, .lhmon-table td { padding: 10px 5px !important; }
            .lh-tg-cell { padding: 10px 5px !important; }
            .lh-onair-cell { padding: 10px 2px !important; }
            .lh-history-cell { padding-left: 10px !important; }
            
            .lhmon-filters { flex-direction: column; align-items: stretch; gap: 12px; padding: 12px; }
            .filter-label { margin-bottom: 2px; font-size: 0.9rem; }
            .checkbox-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; width: 100%; }
            .custom-checkbox { justify-content: center; padding: 8px 5px; font-size: 0.8rem; }
            .input-group { width: 100%; flex-direction: column; align-items: flex-start; gap: 6px; min-width: 0; }
            .input-group input { width: 100%; box-sizing: border-box; }
            
            .lh-tg-num { font-size: 1.1rem; }
            .lh-tg-name { font-size: 0.6rem; }
            .onair-call { font-size: 1.05rem; }
            .lh-call { font-size: 0.9rem; }
            .lh-time { font-size: 0.65rem; }
            .lh-history-wrapper { gap: 10px; padding-bottom: 5px; }
        }
        
        @media (max-width: 480px) {
            html { font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="title-area">
            <h1 class="header-title">📡 BrandMeister Live Monitor</h1>
            <div class="version-info">Standalone Widget | Fixed Columns (110px / 120px) | By DS1UYM</div>
        </div>
        <div class="header-buttons">
            <button id="sound-toggle" class="control-btn sound-btn" onclick="toggleSound()">🔕 소리 알림 켜기</button>
        </div>
    </div>

    <div class="info-box">
        <strong>⭐ 나의 즐겨찾기 콜사인</strong> 
        <div id="fav-list" style="margin-top: 10px;"></div>
        
        <div class="add-form">
            <input type="text" id="new-callsign" placeholder="콜사인 입력 (예: DS1UYM)" maxlength="10">
            <button onclick="addCallsign()">즐겨찾기 추가</button>
        </div>
    </div>

    <div class="lhmon-wrapper">
        <div class="lhmon-header">
            <h3>🌐 BM Live Monitoring</h3>
            <span id="lhmon-status" class="lhmon-status">연결 준비 중...</span>
        </div>
        
        <div class="lhmon-filters">
            <strong class="filter-label">🎯 모니터링 필터:</strong>
            <div class="checkbox-group">
                <label class="custom-checkbox"><input type="checkbox" id="chk-450" checked> <span>450</span></label>
                <label class="custom-checkbox"><input type="checkbox" id="chk-krtg" checked> <span>한국(450~)</span></label>
                <label class="custom-checkbox"><input type="checkbox" id="chk-91"> <span>91</span></label>
            </div>
            <div class="input-group">
                <label>추가 TG 입력:</label>
                <input type="text" id="input-custom-tg" placeholder="예: 45069, 3100" value="" onblur="cleanCustomTGInput()">
            </div>
        </div>

        <table class="lhmon-table">
            <thead>
                <tr>
                    <th>TG</th>
                    <th>🎤 ON-AIR</th>
                    <th>HISTORY</th>
                </tr>
            </thead>
            <tbody id="lhmon-body">
                <tr><td colspan="3" style="text-align:center; padding:50px; color:#888;">📡 BM 서버 데이터 수신 대기 중...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer-container">
        <div>Copyright &copy; <span id="footer-year"></span> <strong>DS1UYM (SeJung Kim)</strong>. All rights reserved.</div>
        <div style="color: var(--warn); font-weight: bold; margin-top: 5px;">DVSwitch NMS Dashboard Add-on</div>
    </div>

    <script>
        document.getElementById('footer-year').textContent = new Date().getFullYear();

        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        let soundEnabled = false;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('sound-toggle');
            if (soundEnabled) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                btn.textContent = "🔊 소리 알림 켜짐";
                btn.classList.add("active");
                playBeep(); 
            } else {
                btn.textContent = "🔕 소리 알림 켜기";
                btn.classList.remove("active");
            }
        }

        function playBeep() {
            if (!soundEnabled) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.type = 'square'; 
            
            const now = audioCtx.currentTime;
            
            gainNode.gain.setValueAtTime(0.8, now); 
            gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 3.0); 

            oscillator.frequency.setValueAtTime(880, now);
            oscillator.frequency.setValueAtTime(1046, now + 0.15);
            oscillator.frequency.setValueAtTime(880, now + 0.3);
            oscillator.frequency.setValueAtTime(1046, now + 0.45);
            oscillator.frequency.setValueAtTime(880, now + 0.6);
            
            oscillator.start(now);
            oscillator.stop(now + 3.0);
        }

        let favorites = [];
        try {
            favorites = JSON.parse(localStorage.getItem('bm_favorites'));
            if (!Array.isArray(favorites)) favorites = [];
        } catch(e) { favorites = []; }

        function saveFavorites() { localStorage.setItem('bm_favorites', JSON.stringify(favorites)); }

        function renderFavorites() {
            const favListDiv = document.getElementById('fav-list');
            favListDiv.innerHTML = '';
            if (favorites.length === 0) {
                favListDiv.innerHTML = "<span style='color:#aaa; font-size:0.9rem;'>등록된 즐겨찾기 콜사인이 없습니다.</span>";
                return;
            }
            favorites.forEach(call => {
                const span = document.createElement('span');
                span.className = 'favorite-tag';
                span.innerHTML = `${call} <button class="delete-btn" onclick="deleteCallsign('${call}')">✕</button>`;
                favListDiv.appendChild(span);
            });
        }

        function addCallsign() {
            const input = document.getElementById('new-callsign');
            const callsign = input.value.trim().toUpperCase();
            if (!callsign) return alert('콜사인을 입력하세요.');
            if (favorites.includes(callsign)) return alert('이미 등록된 콜사인입니다.');
            favorites.push(callsign);
            saveFavorites(); renderFavorites(); input.value = '';
        }

        function deleteCallsign(callsign) {
            favorites = favorites.filter(c => c !== callsign);
            saveFavorites(); renderFavorites();
        }

        document.getElementById('new-callsign').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addCallsign();
        });

        renderFavorites();

        function cleanCustomTGInput() {
            const inputEl = document.getElementById('input-custom-tg');
            let rawVal = inputEl.value;
            if (!rawVal) return;
            let tgList = rawVal.split(',').map(s => s.trim()).filter(s => s !== '');
            let uniqueTgs = [...new Set(tgList)];
            
            const is450Checked = document.getElementById('chk-450').checked;
            const isKrTgChecked = document.getElementById('chk-krtg').checked;
            const is91Checked = document.getElementById('chk-91').checked;

            uniqueTgs = uniqueTgs.filter(tg => {
                if (is450Checked && tg === "450") return false;
                if (isKrTgChecked && tg.startsWith("450")) return false; 
                if (is91Checked && tg === "91") return false;
                return true;
            });
            inputEl.value = uniqueTgs.join(', ');
        }

        function openQRZPopup(callsign) {
            const url = `https://www.qrz.com/db/${callsign}`;
            const width = 800, height = 700;
            const left = (screen.width / 2) - (width / 2);
            const top = (screen.height / 2) - (height / 2);
            window.open(url, `QRZ_${callsign}`, `width=${width},height=${height},top=${top},left=${left},scrollbars=yes,resizable=yes`);
        }

        const tgNames = { "450": "South-Korea", "91": "World-Wide", "45099": "Vu-Test", "45033": "HQ-Seoul", "450997": "Echo-Test" };
        const tgData = {}; 
        window.activePTT = {};

        function renderLHMON() {
            const tbody = document.getElementById('lhmon-body');
            const now = Date.now();
            const ONE_HOUR = 3600000; 

            // activePTT 만료 체크 (객체 형태 처리 대응)
            Object.keys(window.activePTT).forEach(call => {
                const pttTime = window.activePTT[call].time || window.activePTT[call];
                if (now - pttTime > 180000) {
                    delete window.activePTT[call];
                }
            });

            Object.keys(tgData).forEach(tg => {
                tgData[tg].history = tgData[tg].history.filter(h => now - h.time <= ONE_HOUR);
                if (tgData[tg].history.length === 0) delete tgData[tg];
            });

            const sortedTGs = Object.keys(tgData).sort((a, b) => {
                const aIs450 = a.startsWith("450");
                const bIs450 = b.startsWith("450");

                if (aIs450 && !bIs450) return -1;
                if (!aIs450 && bIs450) return 1;

                return parseInt(a, 10) - parseInt(b, 10);
            });

            if (sortedTGs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:50px; color:#888;">📡 수신 대기 중...</td></tr>';
                return;
            }

            let html = '';
            sortedTGs.forEach(tg => {
                const data = tgData[tg];
                const tgName = tgNames[tg] || ""; 
                
                let activeCall = null;
                let activeTimeStr = "";
                let activeAlias = ""; // 💡 현재 송신자의 별명 저장용 변수
                let historyItems = [];

                data.history.forEach((h) => {
                    if (window.activePTT[h.call]) {
                        activeCall = h.call;
                        // 현재 송신자의 별명을 우선 가져오고, 없으면 history에 남은 별명 사용
                        activeAlias = window.activePTT[h.call].alias || h.alias || ""; 
                        
                        const pttTime = window.activePTT[h.call].time || h.time;
                        const diffSec = Math.floor((now - pttTime) / 1000);
                        const m = Math.floor(diffSec / 60).toString().padStart(2, '0');
                        const s = (diffSec % 60).toString().padStart(2, '0');
                        activeTimeStr = `${m}:${s}`;
                    } else {
                        historyItems.push(h);
                    }
                });

                html += `<tr>
                    <td class="lh-tg-cell">
                        <span class="lh-tg-num">${tg}</span>
                        ${tgName ? `<span class="lh-tg-name">${tgName}</span>` : ''}
                    </td>
                    
                    <td class="lh-onair-cell">
                        <div class="onair-wrapper">`;
                
                if (activeCall) {
                    const favClass = favorites.includes(activeCall) ? 'fav-call' : '';
                    html += `
                        <span class="lh-call onair-call ${favClass}" onclick="openQRZPopup('${activeCall}')" title="QRZ 조회">${activeCall}<span class="ptt-icon">🔊</span></span>
                        ${activeAlias ? `<div class="onair-alias-wrapper"><span class="onair-alias">${activeAlias}</span></div>` : ''}
                        <span class="time active-time">${activeTimeStr}</span>
                    `;
                } else {
                    html += `<span class="onair-empty">수신 대기</span>`;
                }
                
                html += `</div></td>
                    <td class="lh-history-cell">
                        <div class="lh-history-wrapper">`;
                
                historyItems.forEach((h, index) => {
                    const diffSec = Math.floor((now - h.time) / 1000);
                    const m = Math.floor(diffSec / 60).toString().padStart(2, '0');
                    const s = (diffSec % 60).toString().padStart(2, '0');
                    const timeStr = `${m}:${s}`;
                    
                    const isFav = favorites.includes(h.call);
                    const favCallClass = isFav ? 'fav-call' : '';
                    const favContainerClass = isFav ? 'fav-history-glow' : '';

                    html += `
                        <div class="lh-item-container">
                            <div class="lh-item ${favContainerClass}">
                                <span class="lh-call ${favCallClass}" onclick="openQRZPopup('${h.call}')" title="QRZ 조회">${h.call}</span>
                                <span class="time time-dim">${timeStr}</span>
                            </div>
                            ${index < historyItems.length - 1 ? `<span class="lh-comma">,</span>` : ''}
                        </div>
                    `;
                });

                html += `</div></td></tr>`;
            });

            tbody.innerHTML = html;

            // 💡 여기서부터 폰트 자동 크기 조절 로직 💡
            document.querySelectorAll('.onair-alias').forEach(el => {
                let fontSize = 0.85; // 시작 폰트 크기 (rem 단위)
                el.style.fontSize = fontSize + 'rem';
                const wrapper = el.parentElement;
                
                // 실제 글자 너비(scrollWidth)가 컨테이너(clientWidth)보다 크면 글자를 깎아냄
                // 가독성을 위해 최소 크기는 0.55rem 까지만 줄어들도록 제한합니다.
                while (el.scrollWidth > wrapper.clientWidth && fontSize > 0.55) {
                    fontSize -= 0.05;
                    el.style.fontSize = fontSize + 'rem';
                }
            });
        }

        setInterval(renderLHMON, 1000);

        const socket = io("https://api.brandmeister.network", {
            path: "/lh/socket.io",
            transports: ["websocket"],
            reconnection: true,             
            reconnectionDelay: 1000,        
            reconnectionDelayMax: 5000      
        });

        const statusBadge = document.getElementById('lhmon-status');

        socket.on("connect", () => {
            statusBadge.innerText = "BM 실시간 수신 중";
            statusBadge.style.color = "#00e676";
            statusBadge.style.borderColor = "#00e676";
            statusBadge.style.background = "rgba(0, 230, 118, 0.1)";
        });

        socket.on("disconnect", () => {
            statusBadge.innerText = "연결 끊김 (재시도 중)";
            statusBadge.style.color = "#ff5252";
            statusBadge.style.borderColor = "#ff5252";
            statusBadge.style.background = "rgba(255, 82, 82, 0.1)";
        });

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                if (socket.disconnected) socket.connect();
            }
        });

        socket.on("mqtt", (data) => {
            try {
                const p = JSON.parse(data.payload);
                const sourceCall = p.SourceCall ? p.SourceCall.trim() : "UNKNOWN";
                const talkerAlias = p.TalkerAlias ? p.TalkerAlias.trim() : ""; // 💡 Alias 추출
                const dest = String(p.DestinationID || "");
                
                if (sourceCall === "UNKNOWN" || !dest || dest === "4000") return;

                // 기존에는 timestamp만 저장했지만, 객체 형태로 시간과 Alias를 함께 저장
                let prevActivePTT = (window.activePTT[sourceCall] && window.activePTT[sourceCall].time) ? window.activePTT[sourceCall].time : 0;

                if (p.Event === "Session-Start" || p.Event === "Session-Update") {
                    window.activePTT[sourceCall] = { time: Date.now(), alias: talkerAlias };
                } else if (p.Event === "Session-Stop") {
                    delete window.activePTT[sourceCall];
                } else if (!p.Event) {
                    window.activePTT[sourceCall] = { time: Date.now(), alias: talkerAlias };
                }

                const chk450 = document.getElementById('chk-450').checked;
                const chkKrTg = document.getElementById('chk-krtg').checked;
                const chk91 = document.getElementById('chk-91').checked;
                
                const customInput = document.getElementById('input-custom-tg').value;
                const customTGs = customInput ? customInput.split(',').map(s => s.trim()).filter(s => s !== "") : [];

                let isTargetTG = false;
                if (chk450 && dest === "450") isTargetTG = true;
                if (chkKrTg && dest.startsWith("450")) isTargetTG = true;
                if (chk91 && dest === "91") isTargetTG = true;
                if (customTGs.includes(dest)) isTargetTG = true;

                if (isTargetTG) {
                    Object.keys(tgData).forEach(tg => {
                        tgData[tg].history = tgData[tg].history.filter(h => h.call !== sourceCall);
                        if (tgData[tg].history.length === 0) {
                            delete tgData[tg];
                        }
                    });

                    if (!tgData[dest]) tgData[dest] = { history: [], lastActive: 0 };
                    
                    // 히스토리에도 alias 저장
                    tgData[dest].history.unshift({ call: sourceCall, alias: talkerAlias, time: Date.now() });
                    tgData[dest].lastActive = Date.now();

                    if (favorites.includes(sourceCall) && p.Event !== "Session-Stop") {
                        if (Date.now() - prevActivePTT > 5000) {
                            playBeep();
                            if (Notification.permission === "granted") {
                                new Notification("BM 알림", { body: `${sourceCall} 님이 TG ${dest} 으로 송신 중입니다.` });
                            }
                        }
                    }
                    
                    renderLHMON();
                }
            } catch (e) {
            }
        });
    </script>
</body>
</html>
